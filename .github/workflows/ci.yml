name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  wrapper-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
        working-directory: wrapper
      - run: pytest tests/ -v
        working-directory: wrapper

  classifier-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
        working-directory: classifier
      - run: pytest tests/ -v
        working-directory: classifier

  ingestion-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
        working-directory: ingestion
      - run: pytest tests/ -v
        working-directory: ingestion

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  docker-build:
    runs-on: ubuntu-latest
    needs: [wrapper-tests, classifier-tests, ingestion-tests, dashboard-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
        env:
          MCP_INSIGHT_API_KEY: ci-placeholder-key
